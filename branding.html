<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branding | Makné</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="CSS/branding.css">
</head>

<body>

<nav>
<a href="index.html">← Volver</a>
</nav>

<section>
  <div class="branding-hero">
    <h1>Branding e Identidad</h1>
    <p>Diseño identidades que conectan, posicionan y perduran.</p>
  </div>

  <div class="branding-grid">

    <div class="branding-card" onclick="openBrand(0)">
      <img src="img/brand1.jpg">
      <div class="branding-info">
        <h3>Golden Bangtan</h3>
        <p>Identidad emocional</p>
      </div>
    </div>

    <div class="branding-card" onclick="openBrand(1)">
      <img src="img/brand2.jpg">
      <div class="branding-info">
        <h3>Visual Studio</h3>
        <p>Minimalismo premium</p>
      </div>
    </div>

  </div>
</section>

<div id="brandPanel" class="brand-panel"></div>
  
<div id="panel" class="panel"></div>

<script src="JS/branding.js"></script>
</body>
</html>
